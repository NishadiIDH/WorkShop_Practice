<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
</head>
<body>
  <h1>Calculator</h1>

  <!-- Addition Form -->
  <h2>Addition</h2>
  <form action="/add" method="GET">
    <div>
      <label for="a">Number 1:</label>
      <input type="text" id="a" name="a" required>
    </div>
    <div>
      <label for="b">Number 2:</label>
      <input type="text" id="b" name="b" required>
    </div>
    <button type="submit">Calculate Sum</button>
  </form>

  <hr>

  <!-- Subtraction Form -->
  <h2>Subtraction</h2>
  <form action="/subtract" method="GET">
    <div>
      <label for="a">Number 1:</label>
      <input type="text" id="a" name="a" required>
    </div>
    <div>
      <label for="b">Number 2:</label>
      <input type="text" id="b" name="b" required>
    </div>
    <button type="submit">Calculate Difference</button>
  </form>

  <hr>

  <!-- Multiplication Form -->
  <h2>Multiplication</h2>
  <form action="/multiply" method="GET">
    <div>
      <label for="a">Number 1:</label>
      <input type="text" id="a" name="a" required>
    </div>
    <div>
      <label for="b">Number 2:</label>
      <input type="text" id="b" name="b" required>
    </div>
    <button type="submit">Calculate Product</button>
  </form>

</body>
</html>
